<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Jander Gois</title>
    <link rel="stylesheet" href="styles/style.css">
  </head>
  <body>

    <section class="header-navigation">
      <a id="hmb_icon" class="box-10 hmb"></a>
      <div id="header_title" class="box-40 name"></div>
      <div id="lang_box" class="box-50 lang lang-box">
          <a id="earth_icon"></a><a id="lang" class="text"></a><a href="" id="arr_icon"></a>
      </div>
    </section>

    <section id="that_i_am" class="text-combo">
      <div class="img">
        <img src="images/Software Developer.svg" alt="">
      </div>
      <div id="personal_title" class="title"></div>
      <div id="personal_text" class="paragraph">
      </div>
      <div class="centered">
        <button id="personal_read_more" class="btn"></button>
      </div>
    </section>

    <section id="tecnologies" class="text-combo">
      <div class="img">
        <img src="images/Application development.svg" alt="">
      </div>
      <div id="tecnologies_title" class="title"></div>
      <div id="tecnologies_text" class="paragraph">
      </div>
      <div class="centered">
        <button id="tecnologies_read_more" class="btn"></button>
      </div>
    </section>

    <section class="text-combo">
      <div class="img">
        <img src="images/Admin Control Panel.svg" alt="">
      </div>
      <div id="skills_title" class="title"></div>
      <div id="skills_text" class="paragraph">
      </div>
      <div class="centered">
        <button id="skills_read_more" class="btn"></button>
      </div>
    </section>

    <section class="text-combo">
      <div class="img">
        <img src="images/Software code testing.svg" alt="">
      </div>
      <div id="projects_title" class="title"></div>
      <div id="projects_text" class="paragraph"></div>
      <div class="centered">
        <button id="projects_read_more" class="btn"></button>
      </div>
    </section>

    <dialog id="modal" class="cookies">
      <div class="top"><a href="" id="close_icon"></a></div>
      <div id="cookies_text" class="m-text"></div>
      <button id="understand" class="m-btn yes btn"></button>
      <button class="m-btn btn warn" id="close_app"></button>
    </dialog>

    <section id="l_modal" class="language-modal hidden">
      <div id="pt_option" class="pt-option"><span><img style="width: 20px; height:15px;" src="images/flags/brazil.svg" alt=""></span><span>Português</span></div>
      <div id="en_option" class="en-option"><span><img style="width: 20px; height:12px;" src="images/flags/usa.svg" alt=""></span><span>English</span></div>
    </section>
  
  <footer>
    <section class="box-40">

    </section>
    <section class="box-20 footer-midle-box">
      <div id="footer_developer" class="dev-name"></div>
      <div id="footer_copyright" class="copy"><span></span></div>
    </section>
    <section class="box-40 contact-icons">
      <a href="" id="whatsapp_icon"></a>
      <a href="" id="instagram_icon"></a>
      <a href="" id="linkedin_icon"></a>
    </section>
  </footer>
      
	<script type="module" src="scripts/app.js"></script>

  </body>
</html>
